<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SSE Chat Test</title>
    <style>
        * {
            box-sizing: border-box;
        }
        .shell {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            width: 400px;
            height: 400px;
            background-color: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="card">
            <h1>AI SSE Chat Test</h1>
            <label for="query">输入问题：</label>
            <textarea id="query" placeholder="请输入问题"></textarea>
        </div>
        <div class="controls">
            <button id="sendBtn">开始对话</button>
            <div id="status" class="status">状态：待机</div>
        </div>
        <div class="output" id="output"></div>
    </div>
    <script>
        const sendBtn = document.getElementById('sendBtn');
        const queryInput = document.getElementById('query');
        const outputEl = document.getElementById('output');
        const statusEl = document.getElementById('status');

        let es = null;// 全局

        function closeEventSource(){
            if(es){
                es.close();
                es = null;
            }
            sendBtn.disabled = false;
        }

        sendBtn.addEventListener('click',function(){
            const query = queryInput.value.trim();
            if(!query){
                alert('请输入问题');
                return;
            }
            outputEl.innerHTML = '';
            sendBtn.disabled = true;
            statusEl.textContent = '连接中';
            // 编码查询参数，防止注入攻击
            const url = `/ai/chat/stream?query=${encodeURIComponent(query)}`;
            // EventSource 用于建立服务器到浏览器的单向实时连接，用于接收服务器发送的事件流
            es = new EventSource(url);
            es.onopen = ()=>{
                statusEl.textContent = '已成功连接';
            }
            es.onmessage = (e)=>{
                outputEl.textContent+=e.data;
            }
            es.onerror = (e) =>{
                statusEl.textContent = '连接失败';
                closeEventSource();
            }

        })
        window.addEventListener('beforeunload',closeEventSource);
    </script>
</body>
</html>
