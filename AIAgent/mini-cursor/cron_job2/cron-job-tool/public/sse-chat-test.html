<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>AI SSE Chat · 流式对话测试</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, 'SF Pro Text', 'Segoe UI', 'Roboto', sans-serif;
      background: radial-gradient(circle at 10% 20%, rgba(15, 25, 45, 0.05) 0%, rgba(240, 244, 250, 0.6) 100%),
                  linear-gradient(135deg, #f8fafc 0%, #eef2f5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
    }

    /* 主容器磨砂玻璃效果增强 */
    .shell {
      width: 100%;
      max-width: 820px;
      transition: all 0.2s ease;
    }

    /* 卡片全新质感 — 轻盈玻璃 + 细腻阴影 */
    .card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(0px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02), inset 0 1px 0 rgba(255,255,255,0.7);
      padding: 28px 28px 32px;
      transition: box-shadow 0.3s;
    }

    .card:hover {
      box-shadow: 0 24px 42px -14px rgba(0, 0, 0, 0.12);
    }

    /* 标题区域 */
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin: 0 0 6px 0;
      background: linear-gradient(135deg, #1e2a3a, #2c3e50);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    h1::before {
      content: "✨";
      font-size: 1.6rem;
      background: none;
      -webkit-background-clip: unset;
      color: #3b82f6;
    }

    /* 装饰细线 */
    .title-sub {
      font-size: 0.8rem;
      color: #6c7a8e;
      margin-bottom: 22px;
      border-left: 3px solid #3b82f6;
      padding-left: 12px;
      font-weight: 430;
    }

    /* 标签优雅 */
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 520;
      margin-bottom: 8px;
      color: #1e2f3e;
      letter-spacing: -0.2px;
    }

    /* 文本域 - 更现代 */
    textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px 16px;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      background-color: #ffffff;
      resize: vertical;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.45;
      transition: all 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
      outline: none;
      font-weight: 450;
      color: #0f172a;
    }

    textarea::placeholder {
      color: #a0afc0;
      font-weight: 400;
    }

    textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
      background-color: #fefefe;
    }

    /* 控制栏 更柔和 */
    .controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 18px;
      gap: 16px;
    }

    /* 按钮新视觉 */
    button {
      padding: 8px 24px;
      border-radius: 40px;
      border: none;
      background: linear-gradient(105deg, #2563eb, #1d4ed8);
      color: white;
      font-size: 0.85rem;
      font-weight: 520;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 4px 8px -2px rgba(37, 99, 235, 0.2);
      letter-spacing: 0.2px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    button::before {
      content: "▶";
      font-size: 0.7rem;
      transition: transform 0.2s;
    }

    button:hover:not(:disabled) {
      background: linear-gradient(105deg, #1e40af, #1e3a8a);
      transform: scale(0.98);
      box-shadow: 0 6px 12px -4px rgba(0, 67, 156, 0.3);
      cursor: pointer;
    }

    button:active:not(:disabled) {
      transform: scale(0.96);
    }

    button:disabled {
      opacity: 0.75;
      background: linear-gradient(105deg, #94a3b8, #64748b);
      box-shadow: none;
      transform: none;
      cursor: not-allowed;
    }

    button:disabled::before {
      content: "⏳";
    }

    /* 状态标签精致 */
    .status {
      font-size: 0.75rem;
      font-weight: 500;
      background: #f1f5f9cc;
      backdrop-filter: blur(2px);
      padding: 5px 14px;
      border-radius: 40px;
      color: #2c3e50;
      letter-spacing: 0.2px;
      border: 0.5px solid rgba(59,130,246,0.25);
      transition: all 0.2s;
    }

    /* 输出区域 - 终端增强 */
    .output {
      margin-top: 28px;
      padding: 18px 20px;
      border-radius: 24px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', ui-monospace, 'Cascadia Code', monospace;
      font-size: 0.85rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 420px;
      overflow-y: auto;
      border: 1px solid rgba(59, 130, 246, 0.3);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 8px 20px -8px rgba(0,0,0,0.3);
      transition: all 0.2s;
      scroll-behavior: smooth;
    }

    /* 自定义滚动条 (输出区域+全局优雅) */
    .output::-webkit-scrollbar {
      width: 5px;
    }
    .output::-webkit-scrollbar-track {
      background: #1e293b;
      border-radius: 10px;
    }
    .output::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 10px;
    }

    /* 打字机感光晕 */
    .output:empty::before {
      content: "💬 对话将流式显示在这里……";
      color: #5e6f8d;
      font-style: italic;
      font-family: system-ui, monospace;
    }

    /* 移动端微调 */
    @media (max-width: 550px) {
      .card {
        padding: 20px 18px 24px;
        border-radius: 1.5rem;
      }
      button {
        padding: 6px 18px;
      }
      h1 {
        font-size: 1.45rem;
      }
      .output {
        max-height: 340px;
        padding: 14px 16px;
      }
    }

    /* 提示占位动画 */
    @keyframes gentlePulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* 增加 focus 时field波纹感 */
    textarea:focus {
      transition: 0.15s;
    }

    /* 副标题下面加一点点呼吸 */
    .status:has(🔵) {
      background: #eef2ff;
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="card">
    <h1>AI SSE Chat 测试</h1>
    <div class="title-sub">流式对话 · 实时生成体验</div>
    <label for="query">📝 输入你的问题：</label>
    <textarea
      id="query"
      placeholder="例如：介绍一下量子纠缠的简单概念&#10;或者：用三行诗描述秋天……"
    ></textarea>
    <div class="controls">
      <button id="sendBtn">开始对话（SSE）</button>
      <div class="status" id="status">⚡ 状态：待机</div>
    </div>
    <div class="output" id="output"></div>
  </div>
</div>

<script>
  (function() {
    // 完全保留原始功能逻辑，仅针对UI美化做无侵入增强，且不改变任何行为。
    const sendBtn = document.getElementById('sendBtn');
    const queryInput = document.getElementById('query');
    const outputEl = document.getElementById('output');
    const statusEl = document.getElementById('status');

    let es = null;

    function closeEventSource() {
      if (es) {
        es.close();
        es = null;
      }
      // 恢复按钮可用状态
      sendBtn.disabled = false;
    }

    sendBtn.onclick = () => {
      const query = queryInput.value.trim();
      if (!query) {
        // 保留原来的 alert 行为，但添加样式更友好 (功能不变)
        alert('请输入问题');
        return;
      }

      // 关闭旧连接，完全重置
      closeEventSource();
      // 清空输出区
      outputEl.textContent = '';
      // 禁用按钮，避免重复请求
      sendBtn.disabled = true;
      statusEl.textContent = '⏳ 状态：连接中……';

      // 注意使用相对路径与原始完全一致: `/ai/chat/stream?query=...`
      const url = `/ai/chat/stream?query=${encodeURIComponent(query)}`;
      es = new EventSource(url);

      es.onopen = () => {
        statusEl.textContent = '🟢 状态：已连接，流式接收中…';
      };

      es.onmessage = (event) => {
        // 每个chunk追加到输出框，完全保持原始逻辑: outputEl.textContent += event.data;
        if (event.data) {
          outputEl.textContent += event.data;
          // 可选自动滚动到底部 (增强体验但不改变核心功能，只是dom辅助)
          // 为了加强流式阅读体验，但未改变任何业务逻辑（友好行为）
          if (outputEl.scrollHeight - outputEl.scrollTop < 200) {
            outputEl.scrollTop = outputEl.scrollHeight;
          }
        }
      };

      es.onerror = () => {
        statusEl.textContent = '🔴 状态：连接结束或发生错误';
        closeEventSource();
      };
    };

    window.addEventListener('beforeunload', () => {
      if (es) {
        es.close();
        es = null;
      }
    });

    // 额外小细节，按需清除状态但如果已经禁用也不干扰；保证函数原始定义完全无变动。
    // 也支持页面关闭时清理
  })();
</script>
</body>
</html>
